      box-shadow:0 8px 32px rgba(0,0,0,.25); z-index:9999; opacity:0; transition:opacity .2s, transform .25s ease; max-width:90vw; text-align:center; pointer-events:none;

    .pb-btn-purple { background:#5B4FCF; color:#fff; font-weight:700; font-size:15px; padding:14px 0; border-radius:10px; border:none; cursor:pointer; width:100%; transition:background .15s; display:flex; align-items:center; justify-content:center; text-align:center; }
    .pb-btn-purple:hover { background:#4C41B8; }

];

const ORG = {
  name:'Hope Harbor Collective', brandKit:'https://drive.google.com/brand-kit',
  contentVault:'https://dropbox.com/story-assets', website:'https://hopeharbor.org',
  instagram:'@hopeharbor', teamMembers:'Amina, Jay, Carlos',
  fundingLead:'Leah Morgan', techLead:'Jason Kim',
  anchorFunders:'RWJF, Kresge Foundation', dreamFunder:'Ford Foundation',
  similarOrgs:'Community Catalyst, Families Forward',
  brandPrimary:'#1B2459',
  brandAccent:'#F5B700',
  brandFonts:'Inter / System',
  mission:'We help families navigate uncertainty with consistent, dignified community support.',
  programs:['Rapid response support','Navigation + benefits access','Community advocates','Warm handoffs to care'],
  testimonials:[
    'They showed up for my family when everything felt uncertain.',
    'I felt respected for the first time — like I wasn’t alone.',
    'I finally knew what to do next. That changed everything.',
  ],
};

const STORY = {
  title:'How families found stability through trusted community support',
  body:'Our community members are not statistics first. They are parents, neighbors, and advocates navigating systems that were never built with them in mind. This story highlights what changes when support is consistent, dignified, and close to home.',
  quote:'They showed up for my family when everything felt uncertain.',
};

const FORM_STEPS = [
  { title:'Visual Identity',     hint:'Provide the raw materials needed to style the platform to your brand.',
    fields:[{k:'brandKit',label:'Brand kit / style guide',ph:'https://canva.com/brand-hub...'},{k:'contentVault',label:'Content vault (Drive, Dropbox, Box)',ph:'https://drive.google.com/...'}] },
  { title:'Digital Footprint',   hint:'Help us mirror your current online presence.',
    fields:[{k:'website',label:'Website URL',ph:'https://yourorg.org'},{k:'instagram',label:'Instagram handle',ph:'@yourorg'}] },
  { title:'Your Team',           hint:'Map the internal team so we know who to involve.',
    fields:[{k:'teamMembers',label:'Storytelling team (names & emails)',ph:'Maria — maria@org.org\nJames — james@org.org',multi:true},{k:'fundingLead',label:'Funding lead name',ph:'Development Director'},{k:'techLead',label:'Tech / social lead',ph:'Social media manager'}] },
  { title:'Funding Intelligence',hint:'Calibrate the platform to your specific financial goals.',
    fields:[{k:'anchorFunders',label:'Current anchor funders (2–3)',ph:'Ford Foundation, RWJF...',multi:true},{k:'dreamFunder',label:'Your dream funder',ph:'The foundation you haven\'t cracked yet'},{k:'similarOrgs',label:'Best fundraising peers in your space',ph:'Charity: Water, Feeding America...'}] },
  // { title:'Book Your Kickoff', hint:'All set! Pick a time to meet your team.', fields:[] },
];

const ONBOARDING_STEPS = [
  { key:'narrative',label:'Narrative',       time:'2 min',  icon:'✦' },
  { key:'funders',  label:'Funding Universe',time:'2 min',  icon:'$' },
  { key:'template', label:'Brand Style',     time:'2 min',  icon:'⊞' },
  { key:'logistics',label:'Confirm Details', time:'4–6 min',icon:'⊕' },
  { key:'forge',    label:'First Story',     time:'10 min', icon:'✏' },
  { key:'dashboard',label:'Micro-Mission',   time:'2 min',  icon:'✓' },
];

// ── Computed ──────────────────────────────────────────────────────────
function firstIncompleteIdx() {
  if (!S.narrative) return 0;
  if (!S.fundingFocus) return 1;
  if (!S.template) return 2;
  if (S.formStep < 3) return 3;
  if (!S.published) return 4;
  if (!S.missionDone) return 5;
  return -1;
}
function firstIncompleteScreen() {
  const k = firstIncompleteIdx();
  return k < 0 ? 'welcome' : ['narrative','funders','template','logistics','forge','dashboard'][k];
}
function stepDone(i) {
  return (i===0&&!!S.narrative)||(i===1&&!!S.fundingFocus)||(i===2&&!!S.template)||(i===3&&S.formStep>=3)||(i===4&&S.published)||(i===5&&S.missionDone);
}
function stepperActiveIdx() {
  if (String(S.screen).startsWith('jayla')) return -1;
  const map = { narrative:0, funders:1, template:2, logistics:3, forge:4, celebration:4, dashboard:5 };
  if (map[S.screen] !== undefined) return map[S.screen];
  if (S.screen === 'welcome') return firstIncompleteIdx();
  return -1;
}

function stepsCompleted() {
  let n = 0;
  if (S.narrative) n++;
  if (S.fundingFocus) n++;
  if (S.template) n++;
  if (S.formStep >= 3) n++;
  if (S.published) n++;
  if (S.missionDone) n++;
  return n;
}

function recommendedTplIds() {
  const m = {
    bold: ['bold-statement','the-movement'],
    human: ['human-story','steady-voice'],
    community: ['community-feed','human-story'],
    economic: ['data-pulse','steady-voice'],
    policy: ['bold-statement','data-pulse'],
    hopeful: ['human-story','community-feed'],
  };
  const ids = m[S.narrative] || [];
  const fallback = ['human-story','bold-statement'];
  return [...new Set([...ids, ...fallback])].filter(Boolean);
}

// ── Navigation gates ────────────────────────────────────────────────────
function canAccess(screen) {
  if (PRE_BOARDING.includes(screen)) return true;
  if (String(screen).startsWith('jayla')) return true;
  if (screen === 'welcome') return true;
  if (screen === 'narrative') return true;
  if (screen === 'funders') return !!S.narrative;
  if (screen === 'template') return !!S.narrative && !!S.fundingFocus;
  if (screen === 'logistics') return !!S.narrative && !!S.fundingFocus && !!S.template;
  if (screen === 'forge') return !!S.narrative && !!S.fundingFocus && !!S.template && S.formStep >= 3;
  if (screen === 'celebration') return S.published;
  if (screen === 'dashboard') return S.published;
  return true;
}
let toastTimer;
function toast(msg) {
  clearTimeout(toastTimer);
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}
const PRE_BOARDING = ['email','confirm-details','add-materials','files-received','working','schedule-jayla','all-set'];
function ensureValidScreen() {
  if (PRE_BOARDING.includes(S.screen)) return;
  if (String(S.screen).startsWith('jayla')) return;
  if (S.screen === 'celebration' && !S.published) { S.screen = 'forge'; return; }
  if (S.screen === 'welcome') return;
  if (!canAccess(S.screen)) S.screen = firstIncompleteScreen();
}

// ── Actions ───────────────────────────────────────────────────────────
function go(screen) {
  if (!canAccess(screen)) {
    toast('Complete the previous step first.');
    return;
  }
  S.screen = screen;
  render();
}
function pickTemplate(id) { S.template = id; render(); }
function pickNarrative(id) { S.narrative = id; render(); }
function pickFundingFocus(id) { S.fundingFocus = id; render(); }
function advanceFromFunders() { S.screen = 'template'; render(); }
function advForm(n) { S.formStep = n; render(); }
function doPublish() {
  S.published = true;
  go('celebration');
}
function goToDashboardFromCelebration() {
  if (!S.published) return;
  go('dashboard');
}
function doMission() { S.missionDone = true; render(); }
function doPraiseSend() { S.praiseSent = true; render(); }

// ── Pre-Boarding Actions ───────────────────────────────────────────────
let _uploadTimer = null;
function startUpload() {
  S.showUploadModal = true;
  S.uploadSkipped = false;
  render();
  if (_uploadTimer) clearTimeout(_uploadTimer);
  _uploadTimer = setTimeout(() => {
    _uploadTimer = null;
    S.showUploadModal = false;
    S.showUploadSuccess = false;
    S.screen = 'files-received';
    render();
  }, 2400);
}
function skipUpload() { S.uploadSkipped = true; S.screen = 'files-received'; render(); }
function goFromUploadSuccess() { S.showUploadSuccess = false; S.screen = 'files-received'; render(); }
function goFromFilesReceived() { S.screen = 'working'; S.analysisPhase = 0; render(); }
function unlockFullStrategy() { S.screen = 'schedule-jayla'; render(); }
function goFromGreatStart() { S.screen = 'schedule-jayla'; S.analysisPhase = 0; render(); }
let _analysisTimer = null;
function startAnalysisTimer() {
  if (_analysisTimer) clearTimeout(_analysisTimer);
  _analysisTimer = setTimeout(() => {
    _analysisTimer = null;
    if (S.screen === 'working' && S.analysisPhase === 0) {
      S.analysisPhase = 1; render();
    }
  }, 4200);
}
function openScheduleModal() { S.showScheduleModal = true; render(); }
function closeScheduleModal() { S.showScheduleModal = false; render(); }
function selectPBDate(d) { S.selectedDate = d; render(); }
function selectPBTime(t) { S.selectedTime = t; render(); }
function confirmMeeting() {
  if (!S.selectedDate || !S.selectedTime) return;
  S.showScheduleModal = false;
  S.screen = 'all-set';
  render();
}
function goToWorkspace() { toast('🎉 That\'s the end of the pre-boarding prototype!'); }

function ensureForgeBaseline() {
  if (!S.forgeBaseline) {
    S.forgeBaseline = { body: STORY.body + '', quote: STORY.quote + '' };
  }
}
function forgeBodyInput(el) {
  ensureForgeBaseline();
  STORY.body = el.value;
  if (!S.forgeGoalBody && el.value.trim() !== S.forgeBaseline.body.trim()) {
    S.forgeGoalBody = true;
  }
  render();
}
function forgeQuoteInput(el) {
  ensureForgeBaseline();
  STORY.quote = el.value;
  if (!S.forgeGoalQuote && el.value.trim() !== S.forgeBaseline.quote.trim()) {
    S.forgeGoalQuote = true;
  }
  render();
}
function forgeTitleInput(el) {
  STORY.title = el.value;
  render();
}
function forgeAddImage() {
  if (!S.forgeGoalImage) {
    S.forgeGoalImage = true;
    render();
  }
}

// ── SVG Icons ─────────────────────────────────────────────────────────

// ── Stepper ───────────────────────────────────────────────────────────
function stepper() {
  const done = stepsCompleted();
  const pct = Math.round(done / ONBOARDING_STEPS.length * 100);
  const ai = stepperActiveIdx();

  const steps = ONBOARDING_STEPS.map((s,i) => {
    const isDone = stepDone(i);
    const isActive = i === ai;
    const cls = isDone ? 'done' : isActive ? 'active' : 'pending';
    const locked = !canAccess(s.key);
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;cursor:${locked?'not-allowed':'pointer'};opacity:${locked&&!isActive?0.45:1};" onclick="go('${s.key}')">
        <div class="step-circle ${cls}">${isDone ? '✓' : s.icon}</div>
        <div style="text-align:center;">
          <div style="font-size:12px;font-weight:${isActive?700:500};color:${isActive?'#111':'#6B7280'}">${s.label}</div>
          <div style="font-size:11px;color:#9CA3AF;">${s.time}</div>
        </div>
      </div>`;
  }).join(`<div style="flex:1;height:2px;background:#E5E7EB;margin-top:15px;max-width:40px;align-self:flex-start;margin-top:16px;"></div>`);

  return `
    <div class="card" style="padding:18px 24px;margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
        <div style="font-size:14px;font-weight:700;">Let's get you set up!</div>
        <div style="font-size:12px;color:#6B7280;">${done}/${ONBOARDING_STEPS.length} Completed ›</div>
      </div>
      <div style="font-size:12px;color:#9CA3AF;margin-bottom:12px;">Complete these key actions to maximize your impact.</div>
      <div style="height:3px;background:#F3F4F6;border-radius:99px;margin-bottom:18px;overflow:hidden;">
        <div style="height:100%;background:#F5B700;border-radius:99px;transition:width .4s;width:${pct}%"></div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:0;">${steps}</div>
    </div>`;
}

  const quoteHtml = quoteSnippet
    ? `<div style="margin-top:8px;padding:8px 10px;background:#FFFBEB;border-left:3px solid #F5B700;border-radius:0 6px 6px 0;font-size:11px;font-style:italic;color:#57534E;line-height:1.45;">"${quoteSnippet}"</div>`
    : '';
  return `
    <div class="card" style="overflow:hidden;">
      <div style="height:170px;background:${gradient||'linear-gradient(160deg,#1B2459,#0F172A)'};position:relative;">
        <div style="position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.06em;">${category}</div>
        <div style="position:absolute;top:10px;right:10px;font-size:10px;color:rgba(255,255,255,.5);">Created today</div>
        <div style="position:absolute;top:36px;left:10px;background:#F5B700;color:#111;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;">${badge}</div>
        <div style="position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);">
          <div style="font-size:13px;font-weight:600;color:#fff;line-height:1.4;">${title}</div>
        </div>
      </div>
      <div style="padding:12px 14px;">
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">
          ${tags.map(t=>`<span style="font-size:11px;border:1px solid #E5E7EB;border-radius:4px;padding:2px 8px;color:#6B7280;">${t}</span>`).join('')}

        ${quoteHtml}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:${quoteSnippet?10:0};">
          <span style="font-size:12px;color:#374151;font-weight:500;">${author}</span>

            <button class="btn-outline" style="padding:5px 12px;font-size:12px;">▶ Skip</button>

        </div>

    </div>`;
}
function publishedStoryCard() {
  const tags = [S.narrative ? (S.narrative[0].toUpperCase() + S.narrative.slice(1)) : 'Narrative', 'Live'];
  const q = STORY.quote.length > 90 ? STORY.quote.slice(0, 90) + '…' : STORY.quote;
  return storyCard(STORY.title, 'YOUR STORY', ORG.name, tags, 'linear-gradient(160deg,#1B2459,#0F172A)', 'Published', q);
}

// ── Screens ───────────────────────────────────────────────────────────
function screenWelcome() {
  const done = stepsCompleted();
  const nextStep = ONBOARDING_STEPS.find((s,i) => {
    if (i===0 && !S.narrative)         return true;
    if (i===1 && !S.fundingFocus)       return true;
    if (i===2 && !S.template)          return true;
    if (i===3 && S.formStep < 4)       return true;
    if (i===4 && !S.published)         return true;
    if (i===5 && !S.missionDone)       return true;
    return false;
  });

  return wrap(
    topBar('Hey, Darien!', 'Welcome to PosterChild. Complete the steps below to activate your storytelling platform.'),
    `
    ${stepper()}

    <!-- Next step CTA -->
    ${nextStep ? `
    <div class="card" style="padding:24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:20px;">
      <div style="display:flex;align-items:center;gap:14px;">
        <div style="width:44px;height:44px;background:#FFF8DC;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${nextStep.icon}</div>
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#9CA3AF;margin-bottom:2px;">Up Next</div>
          <div style="font-size:16px;font-weight:700;">${nextStep.label}</div>
          <div style="font-size:12px;color:#6B7280;margin-top:2px;">Estimated time: ${nextStep.time}</div>
        </div>
      </div>
      <button onclick="go('${nextStep.key}')" class="btn-yellow" style="padding:11px 24px;font-size:14px;white-space:nowrap;">
        Start ${nextStep.label} →
      </button>
    </div>` : ''}

    <!-- Step list -->
    <div style="font-size:13px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;">All Steps</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${ONBOARDING_STEPS.map((s, i) => {
        const isDone = (i===0&&!!S.narrative)||(i===1&&!!S.fundingFocus)||(i===2&&!!S.template)||(i===3&&S.formStep>=3)||(i===4&&S.published)||(i===5&&S.missionDone);
        const isNext = s === nextStep;
        return `
          <div class="card" style="padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;opacity:${isDone?1:isNext?1:.6};border:${isNext?'1.5px solid #F5B700':'1px solid #E5E7EB'};" onclick="go('${s.key}')">
            <div style="width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:${isDone?'#F5B700':isNext?'#FFF8DC':'#F3F4F6'};color:${isDone?'#1a1a1a':isNext?'#92400E':'#9CA3AF'};border:2px solid ${isDone?'#F5B700':isNext?'#F5B700':'#E5E7EB'};">
              ${isDone ? '✓' : s.icon}
            </div>
            <div style="flex:1;">
              <div style="font-size:14px;font-weight:${isNext?700:600};color:${isDone?'#374151':isNext?'#111':'#6B7280'};">${s.label}</div>
              <div style="font-size:12px;color:#9CA3AF;margin-top:1px;">${s.time} · ${isDone?'Completed':isNext?'Up next':'Not started'}</div>
            </div>
            <span style="font-size:14px;color:${isDone?'#F5B700':'#D1D5DB'};">${isDone?'✓':'›'}</span>
          </div>`;
      }).join('')}
    </div>

    <!-- Completion state -->
    ${done === ONBOARDING_STEPS.length ? `
    <div style="margin-top:20px;background:linear-gradient(135deg,#F5B700,#F59E0B);border-radius:12px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;">

      </div>
      <button onclick="go('dashboard')" style="background:#fff;color:#92400E;font-weight:700;font-size:13px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;">Open Dashboard →</button>
    </div>` : ''}
    `
  );
}

  teamMembers:  { source:'intake', sourceLabel:'From your discovery call',  icon:'👥', why:'We\'ll set up their dashboard access so your team is ready to publish from day one — no onboarding friction.' },

};

function sourceChip(key) {
  const m = SMART_FIELDS[key];
  if (!m) return '';
  const styles = {
    found:  'background:#DCFCE7;color:#15803D;',
    intake: 'background:#FFF8DC;color:#92400E;',
    needed: 'background:#F1F5F9;color:#64748B;',
  };
  const icons = { found:'✦ ', intake:'✦ ', needed:'' };
  return `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;${styles[m.source]}">${icons[m.source]}${m.sourceLabel}</span>`;
}

function smartField(f) {
  const meta = SMART_FIELDS[f.k] || {};
  const isFound = meta.source === 'found' || meta.source === 'intake';
  const borderColor = isFound ? '#F5B700' : '#E5E7EB';
  const bgColor = isFound ? '#FFFDF5' : '#fff';

  const inputEl = f.multi
    ? `<textarea style="width:100%;border:1.5px solid ${borderColor};border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;min-height:72px;resize:vertical;color:#111;background:${bgColor};" onblur="ORG['${f.k}']=this.value">${ORG[f.k]}</textarea>`
    : `<input style="width:100%;border:1.5px solid ${borderColor};border-radius:8px;padding:10px 12px;font-size:13px;color:#111;background:${bgColor};" value="${ORG[f.k]}" placeholder="${f.ph||''}" onblur="ORG['${f.k}']=this.value" />`;

  return `
    <div style="margin-bottom:18px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">
        <label style="font-size:13px;font-weight:600;color:#374151;">${meta.icon||''} ${f.label}</label>
        ${sourceChip(f.k)}
      </div>
      ${inputEl}
      ${meta.why ? `
      <div style="display:flex;align-items:flex-start;gap:7px;margin-top:7px;padding:8px 11px;background:#F9FAFB;border-radius:7px;border:1px solid #F1F5F9;">
        <span style="color:#F5B700;font-size:12px;flex-shrink:0;margin-top:1px;">✦</span>
        <span style="font-size:12px;color:#6B7280;line-height:1.5;">${meta.why}</span>
      </div>` : ''}
    </div>`;
}

// ── Main Render ───────────────────────────────────────────────────────
function render() {
  try {
    ensureValidScreen();
    const map = {
      email:screenEmail,
      'confirm-details':screenConfirmDetails,
      'add-materials':screenAddMaterials,
      'files-received':screenFilesReceived,
      working:screenWorking,
      'schedule-jayla':screenScheduleJayla,
      'all-set':screenAllSet,
      // legacy screens kept for reference
      'upload-landing':screenUploadLanding,
      'great-start':screenGreatStart,
      'pipeline-ready':screenPipelineReady,
      'no-schedule':screenNoSchedule,
      booked:screenBooked,
      // post-boarding screens hidden from prototype
    };
    document.getElementById('app').innerHTML = (map[S.screen]||screenEmail)();
    document.querySelector('[style*="overflow-y:auto;padding:24px"]')?.scrollTo(0,0);
  } catch (e) {
    toast('Render error: ' + (e && e.message ? e.message : String(e)));
    console.error(e);
  }
}
